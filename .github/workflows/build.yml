name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.2.0)'
        required: true
      release_notes:
        description: '更新内容（支持多行）'
        required: false

env:
  APP_NAME: mail-desktop

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            bundles: app,dmg,updater
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,updater

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: cd mail_frontend && pnpm install

      - name: Install desktop dependencies
        run: cd mail_desktop && pnpm install

      - name: Update version
        shell: bash
        run: |
          cd mail_desktop/src-tauri
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${{ github.event.inputs.version }}\"/" tauri.conf.json
          else
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${{ github.event.inputs.version }}\"/" tauri.conf.json
          fi
          cat tauri.conf.json | grep version

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: mail_desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            mail_desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            mail_desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            mail_desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            mail_desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            mail_desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            mail_desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update download page
        run: |
          sed -i "s/版本 [0-9.]*[0-9]/版本 ${{ github.event.inputs.version }}/g" mail_frontend/src/views/download/index.vue
          sed -i "s/mail-desktop_[0-9.]*[0-9]_/mail-desktop_${{ github.event.inputs.version }}_/g" mail_frontend/src/views/download/index.vue
          cat mail_frontend/src/views/download/index.vue | grep -E "版本|mail-desktop_"

      - name: Commit download page changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mail_frontend/src/views/download/index.vue
          git commit -m "chore: 更新下载页版本号为 ${{ github.event.inputs.version }}" || echo "No changes"
          git push

      - name: Create and push tag
        run: |
          git tag -f v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }} --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Flatten and rename artifacts
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "=== 下载的原始结构 ==="
          find artifacts -type f
          # 把嵌套子目录里的文件移到顶层
          find artifacts/macos -mindepth 2 -type f -exec mv {} artifacts/macos/ \;
          find artifacts/windows -mindepth 2 -type f -exec mv {} artifacts/windows/ \;
          find artifacts -type d -empty -delete 2>/dev/null || true

          # 重命名为 ASCII 文件名（中文名上传 GitHub Release 会被截断）
          cd artifacts/macos
          for f in *.dmg; do [ -f "$f" ] && mv "$f" "${APP_NAME}_${VERSION}_universal.dmg"; done
          for f in *.app.tar.gz; do [ -f "$f" ] && mv "$f" "${APP_NAME}.app.tar.gz"; done
          for f in *.app.tar.gz.sig; do [ -f "$f" ] && mv "$f" "${APP_NAME}.app.tar.gz.sig"; done
          cd ../windows
          for f in *_x64-setup.exe; do [ -f "$f" ] && mv "$f" "${APP_NAME}_${VERSION}_x64-setup.exe"; done
          for f in *_x64-setup.nsis.zip; do [ -f "$f" ] && mv "$f" "${APP_NAME}_${VERSION}_x64-setup.nsis.zip"; done
          for f in *_x64-setup.nsis.zip.sig; do [ -f "$f" ] && mv "$f" "${APP_NAME}_${VERSION}_x64-setup.nsis.zip.sig"; done
          cd ../..

          echo "=== 最终结构 ==="
          ls -lh artifacts/macos/
          ls -lh artifacts/windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes || '优化体验并修复已知问题' }}
          draft: false
          prerelease: false
          files: |
            artifacts/macos/*
            artifacts/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
