name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.2.0)'
        required: true
      prev_version:
        description: '上一个版本号，用于生成更新清单 (例如 1.1.0)'
        required: true

env:
  APP_NAME: mail-desktop

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            bundles: dmg,updater
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,updater

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: cd mail_frontend && pnpm install

      - name: Install desktop dependencies
        run: cd mail_desktop && pnpm install

      - name: Update version
        shell: bash
        run: |
          cd mail_desktop/src-tauri
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${{ github.event.inputs.version }}\"/" tauri.conf.json
          else
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${{ github.event.inputs.version }}\"/" tauri.conf.json
          fi
          cat tauri.conf.json | grep version

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: mail_desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            mail_desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            mail_desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            mail_desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            mail_desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            mail_desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            mail_desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update download page
        run: |
          sed -i "s/版本 [0-9.]*[0-9]/版本 ${{ github.event.inputs.version }}/g" mail_frontend/src/views/download/index.vue
          sed -i "s/mail-desktop_[0-9.]*[0-9]_/mail-desktop_${{ github.event.inputs.version }}_/g" mail_frontend/src/views/download/index.vue
          cat mail_frontend/src/views/download/index.vue | grep -E "版本|mail-desktop_"

      - name: Commit download page changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mail_frontend/src/views/download/index.vue
          git commit -m "chore: 更新下载页版本号为 ${{ github.event.inputs.version }}" || echo "No changes"
          git push

      - name: Create and push tag
        run: |
          git tag -f v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }} --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: |
            ## 邮件管理客户端 v${{ github.event.inputs.version }}

            ### 下载
            - **macOS**：下载 `.dmg` 文件
            - **Windows**：下载 `.exe` 文件

            ### 更新
            已安装 v${{ github.event.inputs.prev_version }} 的用户打开客户端会自动提示更新
          draft: false
          prerelease: false
          files: |
            artifacts/macos/*
            artifacts/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
